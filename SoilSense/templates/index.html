<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbiome AI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00d4ff;
    --neon-green: #00ff9d;
    --bg-dark: rgba(11, 15, 20, 0.7);
    --glass-bg: rgba(20, 26, 35, 0.55);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body {
    margin: 0;
    font-family: 'Outfit', sans-serif;
    color: white;
    background-image: url('/static/bg.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  .glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    margin-bottom: 20px;
  }

  header {
    text-align: center;
  }

  header h1 {
    margin: 0 0 10px 0;
    font-size: 2.5rem;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .accuracy {
    font-size: 1.2rem;
    font-weight: 500;
  }

  /* Layout */
  .main-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  @media (min-width: 768px) {
    .main-content {
      flex-direction: row;
    }
    .upload-section, .results-section {
      flex: 1;
    }
  }

  /* Drag & Drop */
  .drop-zone {
    border: 2px dashed var(--neon-cyan);
    border-radius: 20px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .drop-zone.dragover {
    background: rgba(0, 212, 255, 0.1);
    border-color: var(--neon-green);
    transform: scale(1.02);
  }

  .drop-zone p {
    font-size: 1.2rem;
    pointer-events: none;
  }

  .drop-zone .highlight {
    color: var(--neon-green);
    font-weight: bold;
  }

  #preview {
    max-width: 100%;
    border-radius: 12px;
    margin-top: 20px;
    display: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  /* Results */
  .results-section {
    display: none; /* Hidden until upload */
  }

  #status {
    font-size: 1.8rem;
    text-align: center;
    margin-top: 0;
    color: var(--neon-green);
  }

  .results-layout {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .cam-container {
    text-align: center;
  }

  .cam-container h3 {
    margin-top: 0;
    color: #ccc;
  }

  #camImage {
    max-width: 100%;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
  }

  .bars-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .bar-wrapper {
    margin-bottom: 15px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-weight: 500;
  }

  .bar-bg {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    height: 12px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
    border-radius: 10px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .winner-text {
    color: var(--neon-green);
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
  }

  .unsure-text {
    color: #ffd966 !important;
    text-shadow: 0 0 10px rgba(255, 217, 102, 0.5);
  }

  /* Loader Animation */
  .loader {
    display: none;
    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid var(--neon-cyan);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container">
  <header class="glass-panel">
    <h1>AI Microbiome Engine</h1>
    <div class="accuracy" id="accuracyText">Model Accuracy: {{ accuracy }}%</div>
  </header>

  <div class="main-content">
    
    <!-- Left: Upload Section -->
    <div class="upload-section">
      <div class="glass-panel drop-zone" id="dropZone">
        <p id="dropText">Drag & Drop an image here, or <span class="highlight">Click to Browse</span></p>
        <input type="file" id="fileInput" accept="image/*" hidden>
        <img id="preview" alt="Sample Preview">
      </div>
    </div>

    <!-- Right: Results Section -->
    <div class="glass-panel results-section" id="resultsPanel">
      <h2 id="status">AI is thinking...</h2>
      <div class="loader" id="loader"></div>
      
      <div class="results-layout" id="resultsData" style="display: none;">
        <div class="cam-container">
          <h3>AI Focus Map (CAM)</h3>
          <img id="camImage" alt="Class Activation Map">
        </div>
        
        <div class="bars-container">
          <div class="bar-wrapper">
            <div class="bar-label">
              <span id="DIRT_label">DIRT</span>
              <span id="DIRT_text">0%</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="DIRT"></div></div>
          </div>

          <div class="bar-wrapper">
            <div class="bar-label">
              <span id="GRASS_label">GRASS</span>
              <span id="GRASS_text">0%</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="GRASS"></div></div>
          </div>

          <div class="bar-wrapper">
            <div class="bar-label">
              <span id="LEAF_label">LEAF</span>
              <span id="LEAF_text">0%</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="LEAF"></div></div>
          </div>

          <div class="bar-wrapper">
            <div class="bar-label">
              <span id="MIX_label">MIX</span>
              <span id="MIX_text">0%</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="MIX"></div></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // Initialization
  window.onload = function() {
    const acc = parseFloat("{{ accuracy }}");
    const accText = document.getElementById("accuracyText");
    if(acc >= 80) accText.style.color = "var(--neon-green)";
    else if(acc >= 60) accText.style.color = "#ffd966";
    else accText.style.color = "#ff6666";
  };

  // Drag and Drop Logic
  const dropZone = document.getElementById("dropZone");
  const fileInput = document.getElementById("fileInput");
  const preview = document.getElementById("preview");
  const dropText = document.getElementById("dropText");

  dropZone.addEventListener("click", () => fileInput.click());

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    if (e.dataTransfer.files.length) {
      fileInput.files = e.dataTransfer.files;
      handleFile(fileInput.files[0]);
    }
  });

  fileInput.addEventListener("change", (e) => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
    e.target.value = ''; // Reset input to allow selecting the same file again
  });

  function handleFile(file) {
    if (!file.type.startsWith("image/")) return alert("Please upload an image.");
    
    // Show preview
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = "block";
      dropText.style.display = "none";
    };
    reader.readAsDataURL(file);

    // Run prediction
    runPrediction(file);
  }

  async function runPrediction(file) {
    const resultsPanel = document.getElementById("resultsPanel");
    const resultsData = document.getElementById("resultsData");
    const loader = document.getElementById("loader");
    const status = document.getElementById("status");
    
    // Reset UI
    resultsPanel.style.display = "block";
    resultsData.style.display = "none";
    loader.style.display = "block";
    status.textContent = "AI is analyzing sample...";
    status.className = "";

    const classes = ["DIRT", "GRASS", "LEAF", "MIX"];
    classes.forEach(c => {
      document.getElementById(c+"_label").classList.remove("winner-text");
      document.getElementById(c).style.width = "0%";
    });

    const formData = new FormData();
    formData.append("image", file);

    try {
      const response = await fetch("/predict", {
        method: "POST",
        body: formData
      });
      const data = await response.json();

      // Update UI
      loader.style.display = "none";
      resultsData.style.display = "flex";

      // Update Bars
      classes.forEach((c, i) => {
        const percent = (data.probs[i] * 100).toFixed(1);
        setTimeout(() => {
          document.getElementById(c).style.width = percent + "%";
          document.getElementById(c+"_text").textContent = percent + "%";
        }, 100);
      });

      // Handle Winner / Unsure
      if (data.prediction === "UNSURE") {
        status.textContent = "Prediction: UNSURE ⚠️";
        status.classList.add("unsure-text");
      } else {
        status.textContent = "Prediction: " + data.prediction + " ✅";
        document.getElementById(data.prediction+"_label").classList.add("winner-text");
      }

      // Update CAM
      if (data.cam) {
        document.getElementById("camImage").src = "data:image/jpeg;base64," + data.cam;
      }

    } catch (error) {
      loader.style.display = "none";
      status.textContent = "Error analyzing image.";
      status.style.color = "#ff6666";
      console.error(error);
    }
  }
</script>

</body>
</html>
